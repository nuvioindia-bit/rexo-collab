name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm exec vite build

      - name: Zip dist
        run: cd dist && zip -r ../rexo-collab-web.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: rexo-collab-web.zip
          generate_release_notes: true
